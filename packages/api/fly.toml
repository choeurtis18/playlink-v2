# fly.toml app configuration file generated for playlink-v2 on 2026-05-02T23:22:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'playlink-v2'
primary_region = 'iad'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'
  seed_command = 'tsx src/db/seed.ts'

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
